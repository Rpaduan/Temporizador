<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/f840aaec68.js" crossorigin="anonymous"></script>
    <title>Focus Timer</title>
</head>
<body>
    <main>
        <div id="timer">
            <span class="minutes">25</span>
            <span>:</span>
            <span class="seconds">00</span>
        </div>
        <div id="controls">
            <button class="play"><i class="fa-solid fa-circle-play"></i></button>
            <button class="pause"><i class="fa-solid fa-circle-pause"></i></button>
            <button class="stop"><i class="fa-solid fa-circle-stop"></i></button>
            <button class="set"><i class="fa-solid fa-circle-stop"></i></button>
        </div>
    </main>

    <footer>
        <button class="sound-on"><i class="fa-solid fa-volume-high"></i></button>
        <button class="sound-off"><i class="fa-solid fa-volume-xmark"></i></button>
    </footer>
</body>
</html>
